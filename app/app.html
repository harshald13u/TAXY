// SHA-256 hash of a Blob/File. Used to cache OCR results so the same image
// uploaded twice returns instantly without re-running Tesseract.
async function imageHash(file) {
  const buf = await file.arrayBuffer();
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Cache (localStorage) — keys are SHA-256, values are extracted-data JSON
// Auto-expires after 7 days. Limited to 50 entries (LRU).
const _ocrCacheKey = 'taxy_ocr_cache_v1';
function loadOcrCache() {
  try { return JSON.parse(localStorage.getItem(_ocrCacheKey) || '{}'); }
  catch { return {}; }
}
function saveOcrCache(cache) {
  try {
    // Keep only 50 most recent entries
    const entries = Object.entries(cache).sort((a, b) => (b[1].savedAt || 0) - (a[1].savedAt || 0)).slice(0, 50);
    localStorage.setItem(_ocrCacheKey, JSON.stringify(Object.fromEntries(entries)));
  } catch { /* quota exceeded — ignore */ }
}
function getCachedOcr(hash) {
  const cache = loadOcrCache();
  const entry = cache[hash];
  if (!entry) return null;
  // Expire after 7 days
  if (Date.now() - (entry.savedAt || 0) > 7 * 24 * 60 * 60 * 1000) return null;
  return entry.data;
}
function setCachedOcr(hash, data) {
  const cache = loadOcrCache();
  cache[hash] = { data, savedAt: Date.now() };
  saveOcrCache(cache);
}

// Otsu's threshold algorithm — automatically picks the best black/white cutoff.
// Significantly better than fixed threshold=128 for varied lighting.
function otsuThreshold(grayHistogram, totalPixels) {
  let sum = 0;
  for (let t = 0; t < 256; t++) sum += t * grayHistogram[t];
  let sumB = 0, wB = 0, wF = 0, maxVar = 0, threshold = 128;
  for (let t = 0; t < 256; t++) {
    wB += grayHistogram[t];
    if (wB === 0) continue;
    wF = totalPixels - wB;
    if (wF === 0) break;
    sumB += t * grayHistogram[t];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const v = wB * wF * (mB - mF) * (mB - mF);
    if (v > maxVar) { maxVar = v; threshold = t; }
  }
  return threshold;
}

// Tax-logic validation — flag suspicious extracted values
function validateExtractedData(d) {
  const warnings = [];
  if (d.tdsPaid && d.salary && d.tdsPaid > d.salary * 0.35) {
    warnings.push('TDS (' + d.tdsPaid.toLocaleString('en-IN') + ') is more than 35% of salary — please verify, this is unusually high.');
  }
  if (d.hra && d.salary && d.hra > d.salary * 0.6) {
    warnings.push('HRA (' + d.hra.toLocaleString('en-IN') + ') is more than 60% of salary — usually HRA is 40-50%. Please verify.');
  }
  if (d.salary && d.salary < 100000) {
    warnings.push('Detected salary is below ₹1 lakh — this might be a monthly figure. Annual salary needed.');
  }
  if (d.sec80c && d.sec80c > 150000) {
    warnings.push('80C (' + d.sec80c.toLocaleString('en-IN') + ') exceeds ₹1.5L statutory cap — extra is not deductible.');
  }
  if (d.salary && d._components && d._components.basic) {
    const sumComp = (d._components.basic || 0) + (d._components.hra || 0) + (d._components.allowances || 0);
    if (sumComp > d.salary * 1.15) {
      warnings.push('Components sum (' + sumComp.toLocaleString('en-IN') + ') exceeds gross by >15%. Image may have been read wrong.');
    }
  }
  return warnings;
}

// User-correction memory — when user fixes a value, remember the (employer, field) → value mapping
// Next time same employer's doc is uploaded, suggest the saved value.
const _correctionsKey = 'taxy_user_corrections_v1';
function loadCorrections() {
  try { return JSON.parse(localStorage.getItem(_correctionsKey) || '{}'); }
  catch { return {}; }
}
function saveCorrection(employer, field, oldValue, newValue) {
  if (!employer || !field) return;
  const c = loadCorrections();
  c[employer] = c[employer] || {};
  c[employer][field] = { value: newValue, was: oldValue, at: Date.now() };
  try { localStorage.setItem(_correctionsKey, JSON.stringify(c)); } catch { /* quota — ignore */ }
}
function applyKnownCorrections(data) {
  if (!data.employer) return data;
  const c = loadCorrections();
  const known = c[data.employer];
  if (!known) return data;
  // Don't overwrite — just suggest in confidence
  data._knownCorrections = known;
  return data;
}

// Run Tesseract OCR on an image File. Returns plain text.
// Shows progress in the chat via the `onProgress` callback (0..1).
// Now: pre-resizes/contrast-boosts the image first for better accuracy + speed.
async function ocrImage(file, onProgress) {
  // Wait for Tesseract to load if it hasn't yet (3MB download, can take a few seconds on slow networks).
  // Show a helpful "loading OCR engine" message instead of failing instantly.
  if (!window.Tesseract) {
    if (typeof onProgress === 'function') onProgress(0.01); // signal "started"
    if (window.__tesseractReady) {
      try { await window.__tesseractReady; }
      catch (e) { throw new Error('OCR engine failed to load: ' + (e && e.message ? e.message : 'unknown error') + ' Try refreshing the page, or type the values manually.'); }
    } else {
      // No loader installed (head script missing?) — try injecting one inline as a last resort
      throw new Error('OCR engine not available. Refresh the page or type values manually.');
    }
    if (!window.Tesseract) throw new Error('OCR engine still unavailable after waiting. Try a different network or type values manually.');
  }
  // Convert HEIC to JPEG if needed
  let working = file;
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (ext === 'heic' || ext === 'heif') {
    if (typeof onProgress === 'function') onProgress(0.05);
    try { working = await heicToJpeg(file); }
    catch (e) { throw new Error('Could not convert HEIC. Save the screenshot as JPG/PNG and try again.'); }
  }
  // Preprocess (resize + contrast) — speeds up OCR and improves accuracy
  let preprocessed;
  try { preprocessed = await preprocessImage(working); }
  catch (_) { preprocessed = working; /* fall back to original on failure */ }

  const { data } = await window.Tesseract.recognize(preprocessed, 'eng', {
    logger: (m) => {
      if (m.status === 'recognizing text' && typeof onProgress === 'function') {
        // Reserve first 10% for HEIC + preprocessing, rest for OCR
        onProgress(0.1 + (m.progress || 0) * 0.9);
      }
    },
    // PSM 6: assume uniform block of text — better for table-style docs (Form 16, CTC, slips)
    tessedit_pageseg_mode: 6,
  });
  return data.text || '';
}

// === Excel extractor (.xlsx/.xls/.csv) ===
async function extractTextFromExcel(file) {
  if (!window.XLSX) throw new Error('SheetJS not loaded');
  const buf = await file.arrayBuffer();
  const wb = window.XLSX.read(buf, { type: 'array' });
  let allText = '';
  for (const sheetName of wb.SheetNames) {
    const sheet = wb.Sheets[sheetName];
    // Convert each sheet to space-separated text rows
    const csv = window.XLSX.utils.sheet_to_csv(sheet, { FS: '  ', RS: '\n' });
    allText += '\n=== Sheet: ' + sheetName + ' ===\n' + csv + '\n';
  }
  return allText;
}

// === Word extractor (.docx) ===
async function extractTextFromWord(file) {
  if (!window.mammoth) throw new Error('mammoth.js not loaded');
  const buf = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
  return result.value || '';
}

// === PowerPoint extractor (.pptx) — JSZip + DOMParser, no backend, no API key ===
// pptx files are ZIPs containing slide XMLs at ppt/slides/slideN.xml. Text lives
// inside <a:t> (DrawingML "text run") elements within each slide.
async function extractTextFromPPTX(file) {
  try {
    if (!window.JSZip) {
      // Lazy-load JSZip on demand if the head script didn't get to load in time
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Could not load JSZip from CDN'));
        document.head.appendChild(s);
      });
      if (!window.JSZip) throw new Error('JSZip failed to initialise');
    }
    const buffer = await file.arrayBuffer();
    const zip = await window.JSZip.loadAsync(buffer);
    // Match ppt/slides/slide<N>.xml and sort numerically by N (string sort would
    // place slide10 before slide2). The spec calls this out explicitly.
    const slideRe = /^ppt\/slides\/slide(\d+)\.xml$/;
    const slideEntries = Object.keys(zip.files)
      .map(name => { const m = name.match(slideRe); return m ? { name, n: parseInt(m[1], 10) } : null; })
      .filter(Boolean)
      .sort((a, b) => a.n - b.n);
    if (slideEntries.length === 0) throw new Error('No slides found inside the .pptx (corrupt or empty deck)');
    const parser = new DOMParser();
    const parts = [];
    for (const entry of slideEntries) {
      const xml = await zip.files[entry.name].async('text');
      let slideText = '';
      try {
        const doc = parser.parseFromString(xml, 'application/xml');
        // <a:t> is the namespaced DrawingML text element. Browsers' DOMParser
        // exposes the qualified tag name when XML uses prefix, so we use it directly.
        const nodes = doc.getElementsByTagName('a:t');
        const lines = [];
        for (let i = 0; i < nodes.length; i++) {
          const t = (nodes[i].textContent || '').trim();
          if (t) lines.push(t);
        }
        slideText = lines.join('\n');
      } catch (parseErr) {
        // Fallback to regex strip if XML is malformed for one slide — don't kill the whole upload
        slideText = xml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      }
      parts.push('\n--- Slide ' + entry.n + ' ---\n' + slideText);
    }
    return parts.join('\n');
  } catch (e) {
    // Re-throw with a descriptive message so the existing error UI can surface it
    throw new Error('PPTX text extraction failed: ' + (e && e.message ? e.message : String(e)));
  }
}
// Backward-compat alias — older code paths called the lowercase name.
const extractTextFromPptx = extractTextFromPPTX;

// Main entry point — PDF, image, Excel, Word, PowerPoint. All client-side, all free.
async function tryParseUploadedFile(file) {
  const ext = (file.name.split('.').pop() || '').toLowerCase();

  // === EXCEL PATH ===
  if (['xlsx', 'xls', 'csv'].includes(ext)) {
    try {
      const text = await extractTextFromExcel(file);
      let data = parseForm16(text);
      if (!data.salary && !data.tdsPaid && !data.pan) {
        const generic = parseGenericTaxImage(text);
        if (generic.salary || generic.tdsPaid || generic.hra || generic.fdInterest) {
          data = generic;
        } else {
          return { error: 'no-match', text: 'I read the Excel but couldn\'t find tax fields. <br><br>What I read: <br><span style="font-family:monospace;font-size:11px;color:var(--text-muted);">' + esc(text.slice(0, 400)) + '…</span><br><br>Please type the values you want me to use.' };
        }
      }
      data._source = 'excel';
      return { ok: true, data };
    } catch (e) {
      return { error: 'excel-failed', text: 'Couldn\'t read the Excel file: ' + esc(e.message) };
    }
  }

  // === WORD PATH ===
  if (ext === 'docx' || ext === 'doc') {
    if (ext === 'doc') {
      return { error: 'old-word', text: '.doc (Word 97-2003) isn\'t supported — please save as .docx and try again.' };
    }
    try {
      const text = await extractTextFromWord(file);
      let data = parseForm16(text);
      if (!data.salary && !data.tdsPaid && !data.pan) {
        const generic = parseGenericTaxImage(text);
        if (generic.salary || generic.tdsPaid || generic.hra) data = generic;
        else return { error: 'no-match', text: 'I read the Word document but couldn\'t find tax fields. Please type the values.' };
      }
      data._source = 'word';
      return { ok: true, data };
    } catch (e) {
      return { error: 'word-failed', text: 'Couldn\'t read the Word file: ' + esc(e.message) };
    }
  }

  // === POWERPOINT PATH ===
  if (ext === 'pptx' || ext === 'ppt') {
    if (ext === 'ppt') {
      return { error: 'old-ppt', text: 'Old .ppt format isn\'t supported. Save as .pptx in PowerPoint and re-upload.' };
    }
    try {
      const text = await extractTextFromPPTX(file);
      // Pipe extracted text through the same downstream parser as Excel/Word
      const data = parseGenericTaxImage(text);
      if (!data.salary && !data.tdsPaid && !data.hra && !data.fdInterest) {
        return { error: 'no-match', text: 'I read the PowerPoint but couldn\'t find tax fields. <br><br>What I read: <br><span style="font-family:monospace;font-size:11px;color:var(--text-muted);">' + esc(text.slice(0, 400)) + '…</span><br><br>Please type the values you want me to use.' };
      }
      data._source = 'pptx';
      return { ok: true, data };
    } catch (e) {
      return { error: 'pptx-failed', text: 'Couldn\'t read the PowerPoint: ' + esc(e.message) };
    }
  }


  // === IMAGE PATH (Tesseract.js client-side OCR) ===
  if (['jpg', 'jpeg', 'png', 'webp', 'bmp', 'heic', 'heif'].includes(ext)) {
    if (file.size > 10 * 1024 * 1024) {
      return { error: 'too-large', text: 'That image is over 10 MB. Compress it (e.g. tinypng.com) or type the values manually.' };
    }

    // === Cache check: same image uploaded again? Return instantly. ===
    let hash;
    try {
      hash = await imageHash(file);
      const cached = getCachedOcr(hash);
      if (cached) {
        ai('<p class="secondary small" style="font-size:12px; color:#4ade80;">⚡ Recognised from cache — same image was processed before.</p>');
        return { ok: true, data: cached };
      }
    } catch (_) { /* hash failure isn't fatal */ }

    // Show progress card with stages
    const progressId = 'ocr-progress-' + Date.now();
    ai('<div id="' + progressId + '" style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">' +
       '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">' +
         '<div style="width:14px;height:14px;border:1.5px solid rgba(255,255,255,0.2);border-top-color:#a855f7;border-radius:50%;animation:spin 0.8s linear infinite;"></div>' +
         '<span id="' + progressId + '-stage" style="font-size:13.5px;color:var(--text-primary);font-weight:500;">Preprocessing image…</span>' +
       '</div>' +
       '<div style="height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden;">' +
         '<div id="' + progressId + '-bar" style="height:100%;width:0%;background:#a855f7;transition:width 0.3s;"></div>' +
       '</div>' +
       '<p class="secondary small" style="margin-top:8px;font-size:11.5px;">All processing in your browser — image stays on your device. First time loads ~3 MB.</p>' +
    '</div>');
    const setStage = (s) => { const e = document.getElementById(progressId + '-stage'); if (e) e.textContent = s; };

    let text;
    try {
      // Surface the "still downloading the OCR engine" state explicitly so the user
      // knows what's happening if Tesseract.js hasn't finished loading from CDN yet.
      if (!window.Tesseract) {
        setStage('Loading OCR engine (~3 MB) — first time only…');
        if (window.__tesseractReady) {
          try { await window.__tesseractReady; setStage('OCR engine ready, starting…'); }
          catch (e) {
            const card = document.getElementById(progressId);
            if (card) card.remove();
            return { error: 'ocr-load-failed', text: 'Could not load the OCR engine. Network might be blocking the CDN. Try refreshing, or type the values manually below.' };
          }
        }
      }
      setStage('Reading image…');
      text = await ocrImage(file, (p) => {
        const bar = document.getElementById(progressId + '-bar');
        if (bar) bar.style.width = Math.round(p * 100) + '%';
        if (p > 0.1 && p < 0.95) setStage('OCR running… ' + Math.round(p * 100) + '%');
      });
    } catch (e) {
      const card = document.getElementById(progressId);
      if (card) card.remove();
      return { error: 'ocr-failed', text: 'OCR failed: ' + esc(e.message || 'unknown error') + '. Try a clearer image or type the values manually.' };
    }
    setStage('Validating extracted data…');
    // Remove the progress card now that OCR is done
    const card = document.getElementById(progressId);
    if (card) card.remove();

    // Try strict Form 16 parser first
    let data = parseForm16(text);
    let usedFallback = false;
    let isCtc = false;
    // Fallback to generic tax-image parser if strict parser found nothing
    if (!data.salary && !data.tdsPaid && !data.pan) {
      const generic = parseGenericTaxImage(text);
      if (generic.salary || generic.tdsPaid || generic.pan || generic.hra) {
        data = generic;
        usedFallback = true;
        isCtc = !!generic._isCTCDocument;
      } else {
        // Truly nothing — show what text WAS extracted so user can copy values manually
        const snippet = text.trim().slice(0, 400).replace(/\s+/g, ' ');
        return { error: 'no-match', text: 'I read the image but couldn\'t find any salary or tax numbers I could recognise. <br><br>What I read from the image: <br><span style="font-family:monospace;font-size:11.5px;color:var(--text-muted);">' + esc(snippet) + (text.length > 400 ? '…' : '') + '</span><br><br>If your salary/TDS values are in there, please type them — e.g. <i>"salary 18 lakh, tds 2 lakh"</i>.' };
      }
    }
    data._source = usedFallback ? 'ocr-generic' : 'ocr-form16';
    data._isCtcWarning = isCtc;
    // Mark all confidence one notch lower since OCR is less reliable than digital PDF text
    Object.keys(data.confidence || {}).forEach(k => {
      if (data.confidence[k] === 'high') data.confidence[k] = 'medium';
      else if (data.confidence[k] === 'medium') data.confidence[k] = 'low';
    });
    // Tax-logic validation — flag suspicious values
    const warnings = validateExtractedData(data);
    if (warnings.length) data._validationWarnings = warnings;
    // Apply any user corrections from previous uploads of the same employer
    applyKnownCorrections(data);
    // Cache result by image hash so re-upload is instant
    if (hash) try { setCachedOcr(hash, data); } catch (_) {}
    return { ok: true, data };
  }

  // === UNSUPPORTED ===
  if (ext !== 'pdf') {
    return { error: 'unsupported', text: 'Unsupported file type (.' + esc(ext) + '). Please upload a PDF or an image (JPG/PNG).' };
  }
  // Audit fix #9: client-side size cap so large PDFs don't crash the browser tab
  const MAX_PDF_SIZE = 10 * 1024 * 1024; // 10 MB
  if (file.size > MAX_PDF_SIZE) {
    return { error: 'too-large', text: 'That PDF is over 10 MB. Form 16s are usually < 1 MB. Try compressing it (smallpdf.com), or just type the salary and TDS values manually.' };
  }
  try {
    const text = await extractTextFromPdf(file);
    const data = parseForm16(text);
    if (data.isLikelyScanned) {
      return { error: 'scanned', text: 'This looks like a scanned PDF (image-only). Could you type the salary, HRA, and TDS from your Form 16 instead?' };
    }
    if (!data.salary && !data.tdsPaid && !data.pan) {
      return { error: 'no-match', text: "I couldn't find the standard Form 16 fields. Could you type your salary and TDS instead, or upload a different version?" };
    }
    return { ok: true, data };
  } catch (e) {
    // Audit fix #8: PDF.js throws PasswordException for protected files. Detect and report clearly.
    const msg = (e && e.message) || String(e);
    if (msg.toLowerCase().includes('password') || (e && e.name === 'PasswordException')) {
      return { error: 'password', text: 'This PDF is password-protected. Please remove the password (Acrobat → File → Properties → Security → No Security, then save) and try again.' };
    }
    return { error: 'parse-failed', text: 'Couldn\'t read the PDF (file may be corrupted). Please try a different file or type the values manually.' };
  }
}

// Audit fix #12: PAN format validation — 5 letters + 4 digits + 1 letter
function validatePAN(pan) {
  if (!pan) return { ok: false, reason: 'PAN is required.' };
  const cleaned = pan.toUpperCase().replace(/\s/g, '');
  if (!/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(cleaned)) {
    return { ok: false, reason: 'Invalid PAN format. Must be 5 letters + 4 digits + 1 letter (e.g. ABCDE1234F).' };
  }
  // 4th letter encodes type (P=person, F=firm, C=company, etc.)
  const typeChar = cleaned[3];
  if (!'ABCFGHLJPT'.includes(typeChar)) {
    return { ok: false, reason: 'PAN 4th character is unusual — please double-check.' };
  }
  return { ok: true, normalized: cleaned };
}

// ============================================================
// HOUSE PROPERTY (Sec 20 / 21 / 22 / 23 / 24 / 109 / 110)
// ============================================================
function houseProperty(d) {
  const props = (d && d.properties) || [];
  if (!props.length) return { hpIncome: 0, hpDetail: [], lossCarryFwd: 0 };

  // Sec 21(6): max TWO SOPs. Excess SOPs are deemed let-out.
  let sopCount = 0;
  const norm = props.map(p => {
    const t = (p.type || 'SOP').toUpperCase();
    let eff = t;
    if (t === 'SOP') {
      sopCount++;
      if (sopCount > 2) eff = 'DLOP';
    }
    return Object.assign({}, p, { effType: eff });
  });

  let total = 0;
  let sopInterestAgg = 0;
  const SOP_AGG_CAP = 200000;
  const detail = [];

  for (const p of norm) {
    const share = (p.jointSharePct == null ? 100 : p.jointSharePct) / 100;
    const av = Math.max(0, p.annualValue || 0);
    const muni = Math.max(0, p.municipalTaxPaid || 0);
    const intPaid = Math.max(0, p.interestPaid || 0);

    if (p.effType === 'SOP') {
      // Sec 21(6): NIL annual value
      const cap = p.completedIn5y ? 200000 : 30000;
      let allowed = Math.min(intPaid, cap);
      // Aggregate ₹2L cap across both SOPs (Sec 22(2) proviso)
      const room = Math.max(0, SOP_AGG_CAP - sopInterestAgg);
      allowed = Math.min(allowed, room);
      sopInterestAgg += allowed;
      const inc = -(allowed * share);
      total += inc;
      detail.push({ type: 'SOP', av: 0, muni: 0, nav: 0, std30: 0, interest: allowed, share, income: inc });
    } else {
      // LOP / DLOP — Sec 23 + Sec 24(a) + Sec 22 interest (no cap)
      const vacantMonths = Math.max(0, Math.min(12, p.vacantMonths || 0));
      const occupiedAv = av * (12 - vacantMonths) / 12;
      const nav = Math.max(0, occupiedAv - muni);
      const std30 = nav * 0.30;
      const inc = (nav - std30 - intPaid) * share;
      total += inc;
      detail.push({ type: p.effType, av: occupiedAv, muni, nav, std30, interest: intPaid, share, income: inc });
    }
  }
  // Loss carry-forward = full negative (Sec 110, 8 yrs vs future HP only)
  const lossCarryFwd = total < 0 ? Math.abs(total) : 0;
  return { hpIncome: total, hpDetail: detail, lossCarryFwd };
}

// CA-E: family pension deduction — Sec 92(1)(iia)
function familyPensionDeduction(amt, regime) {
  if (!amt || amt <= 0) return 0;
  const cap = regime === 'new' ? 25000 : 15000;
  return Math.min(cap, Math.floor(amt / 3));
}

// CA-E: dividends — Sec 92 residual + Sec 393 TDS. 115BBDA abolished by FA 2020.
function dividendIncome(d) {
  const gross = d.dividend || 0;
  const perCoMax = d.dividendMaxPerCompany || gross;
  const tds = perCoMax > 5000 ? Math.round(gross * 0.10) : 0;
  return { taxable: gross, tds };
}

// CA-E: Sec 153 — savings/FD split; FD covered only for seniors (old 80TTB)
function savingsInterestSplit(d) {
  const sav = d.savingsInterest || 0;
  const fd = d.fdInterest || 0;
  const isSenior = d.ageBand === 'senior' || d.ageBand === 'super_senior' || d.isSenior;
  const isNRI = d.isResident === false;
  let oldDed = 0;
  if (!isNRI) {
    if (isSenior) oldDed = Math.min(sav + fd, 50000);
    else oldDed = Math.min(sav, 10000);
  }
  return { savings: sav, fd, oldDed, totalInterest: sav + fd };
}

// ============================================================
// Feature C — Multi-employer Form 16 helpers
// ============================================================
function addEmployer(emp) {
  state.data.employers = state.data.employers || [];
  state.data.employers.push({
    employerName: emp.employerName || '',
    tan: emp.tan || '',
    salary: Number(emp.salary) || 0,
    basic: Number(emp.basic) || 0,
    hra: Number(emp.hra) || 0,
    tdsPaid: Number(emp.tdsPaid) || 0
  });
  recomputeFromEmployers();
}
function recomputeFromEmployers() {
  rebuildSalaryAggregates(state.data);
}
// Spec helper — sums across employers when the array has entries; else leaves scalars alone.
function rebuildSalaryAggregates(d) {
  const list = d.employers || [];
  if (!list.length) return;
  d.salary = list.reduce((a, e) => a + (e.salary || 0), 0);
  d.basic  = list.reduce((a, e) => a + (e.basic  || 0), 0);
  d.hra    = list.reduce((a, e) => a + (e.hra    || 0), 0);
  const totalSalTds = list.reduce((a, e) => a + (e.tdsPaid || 0), 0);
  d.tdsSalary = totalSalTds;
  d.tdsPaid   = totalSalTds; // back-compat mirror
}
// Spec helper — opens a fresh file picker so the user can upload another Form 16.
// Pushes the current scalars into d.employers as the first entry (if not already present),
// then triggers the file input. The handleFiles() success path already calls
// extractedCardHtml() which (after this commit) shows the multi-employer summary.
function addAnotherEmployer() {
  const d = state.data;
  d.employers = d.employers || [];
  if (d.employers.length === 0 && (d.salary || 0) > 0) {
    d.employers.push({
      employerName: d.lastEmployer || 'Employer 1',
      tan: d.lastTAN || '',
      salary: d.salary || 0,
      basic: d.basic || 0,
      hra: d.hra || 0,
      tdsPaid: d.tdsPaid || d.tdsSalary || 0
    });
  }
  const fi = document.getElementById('fileInput');
  if (fi) fi.click();
}

// ============================================================
// Feature D — Sec 157 (old Sec 89) arrears relief — Form 10E
// ============================================================
function computeArrearsRelief(d) {
  const arrears = Math.max(0, d.salaryArrears || 0);
  if (arrears <= 0) return { arrears: 0, relief: 0, isUserProvided: false };
  const userProvided = Math.max(0, d.arrearsRelief || 0);
  if (userProvided > 0) return { arrears, relief: userProvided, isUserProvided: true };
  // Rough fallback — 5% of arrears. STRONG caveat: must file Form 10E for accurate amount.
  return { arrears, relief: Math.round(arrears * 0.05), isUserProvided: false };
}

// ============================================================
// Feature E — Total taxes paid (bucketed; legacy tdsPaid as fallback)
// ============================================================
function totalTaxesPaid(d) {
  const buckets = (d.tdsSalary || 0) + (d.tdsInterest || 0) + (d.tdsRent || 0) +
                  (d.tdsProfFees || 0) + (d.tdsOther || 0) + (d.tcsCollected || 0) +
                  (d.advanceTax || 0) + (d.selfAssessmentTax || 0);
  if (buckets > 0) return buckets;
  return d.tdsPaid || 0;
}

function recompute() {
  const d = state.data;
  // Feature C — roll up multi-employer scalars before any computation.
  rebuildSalaryAggregates(d);
  // Feature E — legacy tdsPaid back-compat: if old chat flow only set tdsPaid, mirror to tdsSalary.
  if ((d.tdsSalary || 0) === 0 && (d.tdsPaid || 0) > 0) d.tdsSalary = d.tdsPaid;
  // CA-J: NRI cannot claim senior basic exemption; NRI also can't claim Sec 153
  const ageKey = (d.isResident === false) ? 'regular' : (d.ageBand || (d.isSenior ? 'senior' : 'regular'));
  // CA-1: Slabs vary by age (super_senior / senior / regular)
  const slabsForAge = getOldSlabs(ageKey);
  // CA-19: Professional tax cap depends on state
  const profCap = profTaxCap(d.state || 'Maharashtra');
  // CA-20 / CA-1 F11: Employer NPS — Sec 124(2) — 14% in NEW regime (Sec 202),
  // 10% in OLD regime for non-Govt employees. Govt employees always 14% (FA 2025).
  const npsCapBase = (d.basic || 0);
  const isGovtEmployee = d.isGovtEmployee === true;
  const empNpsAllowedOld = Math.min(d.employerNps || 0, npsCapBase * (isGovtEmployee ? 0.14 : 0.10));
  const empNpsAllowedNew = Math.min(d.employerNps || 0, npsCapBase * 0.14);
  // CA-21 + CA-J + CA-1 F5: Sec 153 — savings ₹10k (TTA) / ₹50k senior (TTB, includes FD); NRI = 0
  const intSplit = savingsInterestSplit(d);
  const ttaDed = intSplit.oldDed; // already gates NRI + senior FD inclusion
  // CA-1 F7: Family pension — Sec 92(1)(iia) — min(₹15k old / ₹25k new, 1/3 of pension)
  const fpDedOld = familyPensionDeduction(d.familyPension || 0, 'old');
  const fpDedNew = familyPensionDeduction(d.familyPension || 0, 'new');
  const fpNetOld = Math.max(0, (d.familyPension || 0) - fpDedOld);
  const fpNetNew = Math.max(0, (d.familyPension || 0) - fpDedNew);
  // CA-1 F7: Dividend — Sec 92 residual, taxable at slab in both regimes
  const div = dividendIncome(d);
  // PGBP — Sec 26-66 / Sec 58 / Sec 61. Slab-rate income, joins GTI in BOTH regimes.
  const pg = pgbpIncome(d);
  // CA-F: Clamp Ch VIII inputs at statutory limits before summing
  const sec123 = Math.min(d.sec80c || 0, 150000);
  const sec126Cap = (ageKey === 'senior' || ageKey === 'super_senior') ? 100000 : 75000; // self+parents combined cap
  const sec126 = Math.min(d.sec80d || 0, sec126Cap);
  // CA-A: derive isMetro from city (canonical), keep isMetro as fallback
  const metroFromCity = isHraMetro(d.city);
  const useMetro = (typeof d.isMetro === 'boolean') ? (d.isMetro && metroFromCity || metroFromCity) : metroFromCity;
  // OLD REGIME
  const oldHra = hraExempt(d.hra, d.rent, d.basic, useMetro);
  const oldStd = Math.min(50000, d.salary);
  const oldProf = Math.min(profCap, d.salary);
  const oldNetSalary = Math.max(0, d.salary - oldHra - oldStd - oldProf);
  // House Property (Sec 20-24). Sec 109 caps inter-head HP loss at ₹2L; Sec 110 carries balance fwd 8 yrs.
  const hp = houseProperty(d);
  const hpForOld = hp.hpIncome >= 0 ? hp.hpIncome : -Math.min(200000, Math.abs(hp.hpIncome));
  const hpLossCfOld = hp.hpIncome < 0 ? Math.max(0, Math.abs(hp.hpIncome) - 200000) : 0;
  // CA-1 F6/F7: GTI must include FD interest, dividends, family-pension net of deduction.
  // savingsInterest stays here as gross — TTA/TTB removed below as Ch VIII deduction.
  // STCG on non-equity assets (d.stcgOther) is taxed at SLAB → goes into GTI, NOT special-rate.
  // PGBP income (presumptive deemed profit OR regular net profit) → slab rate, joins GTI.
  const oldGTI = oldNetSalary + d.otherIncome + d.savingsInterest + (d.fdInterest || 0)
               + div.taxable + fpNetOld + hpForOld + (d.stcgOther || 0) + pg.businessIncome;
  // CA-F: Use clamped Sec 123 / Sec 126 instead of raw user input
  const oldChVIII = sec123 + sec126 + empNpsAllowedOld + ttaDed + (d.sec80g || 0);
  const oldTI = Math.max(0, oldGTI - oldChVIII);
  const oldSlabTax = applySlabs(oldTI, slabsForAge);
  const oldRebate = rebateOld(oldTI, oldSlabTax, d.isResident);
  const oldAfterRebate = Math.max(0, oldSlabTax - oldRebate);
  // Sec 188 / 194S / 115BBC — flat 30%, ADDED post-rebate (rebate doesn't shelter these)
  const sp = specialRateTax(d);
  // Sec 196 / 197 / 198 — capital gains, taxed at 12.5% / 20% (NOT slab), ADDED post-rebate too.
  // Sec 156 rebate cannot offset CG tax per 156(2). Surcharge on CG portion capped at 15%.
  const cg = capitalGains(d);
  const oldTaxIncSpecial = oldAfterRebate + sp.total + cg.totalCGTax;
  // Surcharge: lottery (Sec 188) gets FULL rate; VDA + anon donation + CG (Sec 196-198) use 15% cap
  const oldTiForSur = oldTI + sp.total / 0.30 + cg.totalCGSpecialIncome;
  const oldSurBase = surchargeWithCGCap(oldTiForSur, oldAfterRebate + sp.lotteryTax, sp.vdaTax + sp.anonDonTax + cg.totalCGTax, 'old');
  const oldSur = oldSurBase;
  const oldCess = (oldTaxIncSpecial + oldSur) * 0.04;
  const oldTotal = oldTaxIncSpecial + oldSur + oldCess;
  // NEW REGIME (Sec 202)
  const newStd = Math.min(75000, d.salary);
  const newNetSalary = Math.max(0, d.salary - newStd);
  // Sec 202: new regime DISALLOWS inter-head HP loss set-off; positive HP income still taxed.
  const hpForNew = hp.hpIncome > 0 ? hp.hpIncome : 0;
  // CA-1 F6/F7: include FD, dividend, family-pension net (Sec 92) in new regime too.
  // Sec 202 disallows TTA/TTB so savings/FD interest is fully taxable here.
  // STCG on non-equity (d.stcgOther) is also slab-rate so it joins GTI here.
  // PGBP income joins new-regime GTI as well — no presumptive disallowance under Sec 202.
  const newGTI = newNetSalary + d.otherIncome + d.savingsInterest + (d.fdInterest || 0)
               + div.taxable + fpNetNew + hpForNew + (d.stcgOther || 0) + pg.businessIncome;
  const newChVIII = empNpsAllowedNew; // Only Sec 124(2) carries to new regime (14% cap)
  const newTI = Math.max(0, newGTI - newChVIII);
  const newSlabTax = applySlabs(newTI, newSlabs);
  const newRebate = rebateNew(newTI, newSlabTax, d.isResident);
  const newAfterRebate = Math.max(0, newSlabTax - newRebate);
  // Sec 188 / 194S / 115BBC — flat 30%, ADDED post-rebate.
  // Sec 196 / 197 / 198 — capital gains likewise added post-rebate (Sec 156(2)).
  const newTaxIncSpecial = newAfterRebate + sp.total + cg.totalCGTax;
  const newTiForSur = newTI + sp.total / 0.30 + cg.totalCGSpecialIncome;
  const newSur = surchargeWithCGCap(newTiForSur, newAfterRebate + sp.lotteryTax, sp.vdaTax + sp.anonDonTax + cg.totalCGTax, 'new');
  const newCess = (newTaxIncSpecial + newSur) * 0.04;
  const newTotal = newTaxIncSpecial + newSur + newCess;
  // Feature D — Sec 157 arrears relief (Form 10E). Subtract from BOTH regimes' totals.
  const ar = computeArrearsRelief(d);
  const oldTotalAfterRelief = Math.max(0, oldTotal - ar.relief);
  const newTotalAfterRelief = Math.max(0, newTotal - ar.relief);
  // Mutate the per-regime detail objects so display + JSON reflect the post-relief total
  const oldDetailsObj = { hraExempt: oldHra, std: oldStd, prof: oldProf, gti: oldGTI, chVIII: oldChVIII, ttaDed, taxable: oldTI, slab: oldSlabTax, rebate: oldRebate, sur: oldSur, cess: oldCess, total: oldTotalAfterRelief, totalBeforeRelief: oldTotal, npsAllowed: empNpsAllowedOld, hp: hpForOld, hpLossCf: hpLossCfOld, hpDetail: hp.hpDetail, special: sp, cg: cg, pg: pg, fpDed: fpDedOld, divTds: div.tds };
  const newDetailsObj = { std: newStd, gti: newGTI, chVIII: newChVIII, taxable: newTI, slab: newSlabTax, rebate: newRebate, sur: newSur, cess: newCess, total: newTotalAfterRelief, totalBeforeRelief: newTotal, npsAllowed: empNpsAllowedNew, hp: hpForNew, hpDetail: hp.hpDetail, special: sp, cg: cg, pg: pg, fpDed: fpDedNew, divTds: div.tds };
  return {
    oldDetails: oldDetailsObj,
    newDetails: newDetailsObj,
    hpRaw: hp.hpIncome, hpLossCarryFwd: hp.lossCarryFwd,
    cg: cg, pg: pg,
    arrearsRelief: ar,
    oldTotal: oldTotalAfterRelief, newTotal: newTotalAfterRelief,
    oldTotalBeforeRelief: oldTotal, newTotalBeforeRelief: newTotal,
    winner: newTotalAfterRelief < oldTotalAfterRelief ? 'new' : 'old',
    savings: Math.abs(oldTotalAfterRelief - newTotalAfterRelief)
  };
}

           }).join('') +

function checkSvg() { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg>'; }
function arrowDownSvg(size) { size = size || 14; return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>'; }

// Cross-call dedup — file input + drop zone often fire BOTH for the same drop.
// Anything seen in the last 3 seconds is rejected.
window._recentlyProcessedFiles = window._recentlyProcessedFiles || new Map();

async function handleFiles(fileList) {
  const incoming = Array.from(fileList);
  const now = Date.now();

  // Clear entries older than 3s
  for (const [k, ts] of window._recentlyProcessedFiles) {
    if (now - ts > 3000) window._recentlyProcessedFiles.delete(k);
  }

  // Dedup within this call AND against recent calls
  const seen = new Set();
  const files = [];
  for (const f of incoming) {
    const key = f.name + '|' + f.size;
    if (seen.has(key)) continue;
    if (window._recentlyProcessedFiles.has(key)) continue; // already processed in last 3s
    seen.add(key);
    window._recentlyProcessedFiles.set(key, now);
    files.push(f);
  }
  if (files.length === 0) return;

  const preview = document.getElementById('filePreview');
  preview.classList.add('show');
  for (const f of files) {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = '<div class="file-chip-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg></div><span style="max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">' + esc(f.name) + '</span>';
    preview.appendChild(chip);
  }

  // Real PDF parsing — show user the extracted data
  user('<div style="display:flex; flex-direction: column; gap: 6px;">' + files.map(f => '<div style="display: flex; align-items:center; gap: 8px;"><span style="display:inline-block; width:18px; height:18px; background:#ef4444; border-radius:4px;"></span>' + esc(f.name) + '<span style="color: var(--text-muted); font-size: 11px; margin-left: auto;">' + Math.round(f.size/1024) + ' KB</span></div>').join('') + '</div>');
  preview.innerHTML = ''; preview.classList.remove('show');

  await sleep(400); showTyping(); await sleep(900); hideTyping();

  // Audit Issue 3 fix: collect errors, dedupe, show ONE message — not one per file
  const errors = [];
  let parsedOk = false;
  for (const f of files) {
    const result = await tryParseUploadedFile(f);
    if (result.ok) {
      parsedOk = true;
      const d = result.data;
      if (d.salary) state.data.salary = d.salary;
      if (d.hra) state.data.hra = d.hra;
      if (d.tdsPaid) state.data.tdsPaid = d.tdsPaid;
      if (d.pan) state.data.pan = d.pan;
      if (d.sec80c) state.data.sec80c = d.sec80c;
      if (d.sec80d) state.data.sec80d = d.sec80d;
      // Build a smart intro based on detected document type + warnings
      const lib = window._taxPatterns;
      const docType = d._documentType;
      const docDef = lib && docType ? lib.document_types[docType] : null;
      let intro;
      if (docDef) {
        intro = '<p>I read your image — looks like a <b>' + esc(docDef.label) + '</b>.</p>';
        if (docDef.missing_warning) {
          intro += '<p class="secondary small" style="margin-top: 6px; padding: 10px 12px; background: rgba(245,158,11,0.08); border-left: 3px solid #f59e0b; border-radius: 6px;">⚠ ' + esc(docDef.missing_warning) + '</p>';
        }
        if (docDef.annualization_hint) {
          intro += '<p class="secondary small" style="margin-top: 6px; padding: 10px 12px; background: rgba(6,182,212,0.08); border-left: 3px solid #06b6d4; border-radius: 6px;">ℹ ' + esc(docDef.annualization_hint) + '</p>';
        }
      } else if (d._isCtcWarning) {
        intro = '<p>I read your image — looks like a <b>CTC structure</b>, not a Form 16.</p><p class="secondary small" style="margin-top: 6px; padding: 10px 12px; background: rgba(245,158,11,0.08); border-left: 3px solid #f59e0b; border-radius: 6px;">⚠ A CTC structure tells me your salary, but it doesn\'t show <b>TDS already paid</b>. To file accurately, I\'ll need that from your <b>Form 16</b> or <b>salary slip</b>.</p>';
      } else {
        intro = '<p>I read your image. Please check the values below — yellow dots mean you should verify, green means I\'m confident.</p>';
      }
      // Surface validation warnings (P0 sanity issues)
      let warningsHtml = '';
      if (d._validationWarnings && d._validationWarnings.length) {
        warningsHtml = '<div style="margin-top:8px;padding:10px 12px;background:rgba(245,158,11,0.08);border-left:3px solid #f59e0b;border-radius:6px;"><div style="font-size:11px;color:#f59e0b;font-weight:600;letter-spacing:0.5px;margin-bottom:6px;">⚠ SANITY CHECK</div>' + d._validationWarnings.map(w => '<p class="secondary small" style="margin: 4px 0; font-size: 12.5px;">• ' + esc(w) + '</p>').join('') + '</div>';
      }
      ai(intro + extractedCardHtml(d) + warningsHtml +
        '<p class="secondary small" style="margin-top: 10px;">Looks right? Type <b>"yes"</b> to continue. Anything wrong? Just tell me — e.g. <i>"salary should be 19 lakh"</i>.</p>' +
        '<div class="action-row" style="margin-top:8px;">' +
          '<button class="btn btn-secondary" onclick="addAnotherEmployer()">+ Add another employer (upload Form 16)</button>' +
          '<button class="btn btn-secondary" onclick="askMultipleEmployers()">+ Enter employers manually</button>' +
        '</div>');
    } else if (result.error) {
      errors.push(result.text || result.error);
    }
  }
  if (!parsedOk && errors.length > 0) {
    const unique = [...new Set(errors)];
    if (unique.length === 1) {
      ai('<p>' + unique[0] + '</p>');
    } else {

    }

}

function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }

async function sendMessage() {

// Natural language number parser — handles "18 lakh" / "1.5 crore" / "₹18,50,000" / "18 L" / "18L"
function parseIndianNumber(s) {
  if (!s) return null;
  const t = s.toLowerCase().replace(/[₹,\s]/g, '');
  const lakhMatch = t.match(/([\d.]+)\s*(?:l|lac|lakh|lakhs)/);
  const croreMatch = t.match(/([\d.]+)\s*(?:cr|crore|crores)/);
  const thouMatch = t.match(/([\d.]+)\s*(?:k|thousand|thou)/);
  if (croreMatch) return Math.round(parseFloat(croreMatch[1]) * 10000000);
  if (lakhMatch) return Math.round(parseFloat(lakhMatch[1]) * 100000);
  if (thouMatch) return Math.round(parseFloat(thouMatch[1]) * 1000);
  const plain = t.match(/^(\d+(?:\.\d+)?)$/);
  if (plain) return Math.round(parseFloat(plain[1]));
  return null;
}

// Extract field-value pairs from a free-text user message
function parseUserMessage(text) {
  const t = text.toLowerCase();
  const out = {};
  // salary, basic, hra, rent, tds — match "<word> <number with optional lakh/cr/k>"
  const fields = [
    { key: 'salary',   pat: /(?:salary|gross|ctc|annual income|income)\s+(?:is\s+|=\s+)?([₹\d.,\s]+(?:l|lac|lakh|lakhs|cr|crore|crores|k|thousand)?)/i },
    { key: 'basic',    pat: /basic(?:\s+salary)?\s+(?:is\s+|=\s+)?([₹\d.,\s]+(?:l|lac|lakh|lakhs|cr|crore|crores|k|thousand)?)/i },
    { key: 'hra',      pat: /hra\s+(?:is\s+|=\s+)?([₹\d.,\s]+(?:l|lac|lakh|lakhs|cr|crore|crores|k|thousand)?)/i },
    { key: 'rent',     pat: /rent\s+(?:is\s+|=\s+)?([₹\d.,\s]+(?:l|lac|lakh|lakhs|cr|crore|crores|k|thousand)?)/i },
    { key: 'tdsPaid',  pat: /tds\s+(?:is\s+|=\s+)?([₹\d.,\s]+(?:l|lac|lakh|lakhs|cr|crore|crores|k|thousand)?)/i },
    { key: 'sec80c',   pat: /80c\s+(?:is\s+|=\s+)?([₹\d.,\s]+(?:l|lac|lakh|lakhs|cr|crore|crores|k|thousand)?)/i },
    { key: 'sec80d',   pat: /80d\s+(?:is\s+|=\s+)?([₹\d.,\s]+(?:l|lac|lakh|lakhs|cr|crore|crores|k|thousand)?)/i },
  ];
  for (const f of fields) {
    const m = text.match(f.pat);
    if (m) {
      const n = parseIndianNumber(m[1]);
      if (n) out[f.key] = n;
    }
  }
  // Confirmation words
  if (/^(yes|yeah|yep|correct|right|looks good|ok|sure)\b/i.test(t)) out._confirm = true;
  return out;
}

async function handleUserText(text) {
  const parsed = parseUserMessage(text);
  const fmt = n => '₹' + (n||0).toLocaleString('en-IN');

  // If user provided numbers, update state and confirm
  const updates = Object.keys(parsed).filter(k => k !== '_confirm');
  if (updates.length > 0) {
    let summary = '<p>Got it — saved:</p><div style="margin-top:8px;">';
    for (const k of updates) {
      state.data[k] = parsed[k];
      const label = { salary: 'Salary', basic: 'Basic', hra: 'HRA', rent: 'Rent', tdsPaid: 'TDS paid', sec80c: '80C investments', sec80d: '80D health insurance' }[k] || k;
      summary += '<div style="display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;border-bottom:1px solid var(--border);"><span>'+label+'</span><span><b>'+fmt(parsed[k])+'</b></span></div>';
    }
    summary += '</div>';
    // What's missing?
    const missing = [];
    if (!state.data.salary) missing.push('annual salary');
    if (!state.data.basic && state.data.salary) missing.push('basic salary');
    if (state.data.salary && !state.data.tdsPaid) missing.push('TDS already paid');
    if (missing.length > 0) {
      summary += '<p class="secondary small" style="margin-top: 12px;">Still need: <b>'+missing.join(', ')+'</b>. Just type the number — e.g. <i>"basic 9 lakh"</i>.</p>';
    } else {
      summary += '<p style="margin-top: 12px;">I have enough to compute your tax. Type <b>"compute"</b> when ready, or share more details (rent, 80C investments, etc).</p>';
    }
    ai(summary);
    return;
  }
  if (parsed._confirm) {
    ai('<p>Computing your tax under both regimes…</p>');
    await sleep(800);
    state.last = recompute();
    const r = state.last;
    ai('<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:16px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div style="text-align:center;"><div style="font-size:11px;color:var(--text-muted);">OLD REGIME</div><div style="font-size:22px;font-weight:700;margin-top:4px;">'+fmt(Math.round(r.oldTotal))+'</div></div><div style="text-align:center;background:rgba(34,197,94,0.08);border-radius:8px;padding:6px;"><div style="font-size:11px;color:#4ade80;">'+(r.winner==='new'?'NEW':'OLD')+' REGIME · WINNER</div><div style="font-size:22px;font-weight:700;margin-top:4px;color:#4ade80;">'+fmt(Math.round(r.winner==='new'?r.newTotal:r.oldTotal))+'</div></div></div><div style="margin-top:12px;text-align:center;font-size:13.5px;color:var(--text-secondary);">You save <b style="color:#4ade80;">'+fmt(Math.round(r.savings))+'</b> by choosing '+(r.winner==='new'?'new':'old')+' regime '+ref('s202','(Sec 202)')+'.</div></div>');
    return;
  }
  // Help / unsure / fallback
  if (/help|don'?t (know|understand)|stuck|confused|what do/i.test(text)) {
    ai('<p>No worries 👍 — let me ask one thing at a time.</p><p class="secondary small" style="margin-top: 8px;">First: what was your <b>annual salary</b> last year? Type it any way — like "18 lakh" or "1850000" or "₹18,50,000".</p>');
    return;
  }
  // Default
  ai('<p class="secondary small">I didn\'t catch that. Try typing one of:</p><ul style="margin: 8px 0 0 18px; font-size: 13.5px; color: var(--text-secondary); line-height: 1.8;"><li><i>"salary 18 lakh"</i> — to set your salary</li><li><i>"tds 2 lakh"</i> — to set tax already paid</li><li><i>"compute"</i> or <i>"yes"</i> — to compute the tax</li><li><i>"help"</i> — if you\'re stuck</li></ul>');
}

// DEV-1 #1: define toggleSidebar so the mobile hamburger + backdrop don't ReferenceError.
// `force` undefined = toggle, true = open, false = close.
function toggleSidebar(force) {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebarBackdrop');
  const btn = document.querySelector('.hamburger');
  if (!sb) return;
  const willOpen = (typeof force === 'boolean') ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', willOpen);
  if (bd) bd.classList.toggle('show', willOpen);  // backdrop CSS uses .show
  if (btn) btn.setAttribute('aria-expanded', String(willOpen));
}

    }
  });

// LIVE KB SYNC — fetches latest case law + circulars from your
// GitHub repo at startup. Updates daily via the bot. Silent if offline.
// ============================================================
(async function loadLiveKB() {
  const REPO = 'harshald13u/TAXY';
  const URLS = {
    caseLaw: `https://raw.githubusercontent.com/${REPO}/main/landmark_case_law.json`,
    operational: `https://raw.githubusercontent.com/${REPO}/main/operational_reference_data.json`
  };
  state.liveKB = { status: 'loading' };
  try {
    const [caseLaw, operational] = await Promise.all([
      // Audit R11 fix: 5s timeout so a slow GitHub doesn't hang the page
      Promise.race([
        fetch(URLS.caseLaw, { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
        new Promise(res => setTimeout(() => res(null), 5000))
      ]),
      Promise.race([
        fetch(URLS.operational, { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
        new Promise(res => setTimeout(() => res(null), 5000))
      ])
    ]);
    state.liveKB = { caseLaw, operational, status: 'ok' };
    const tsRaw = [caseLaw?.metadata?.last_auto_update, operational?.metadata?.last_auto_update].filter(Boolean).sort().pop();
    const cases = (caseLaw?.pending_review?.length || 0) + (caseLaw?.cases?.length || 0);
    const ops = Object.values(operational?.pending_review || {}).reduce((s, a) => s + (a?.length || 0), 0)
              + Object.values(operational?.updates || {}).reduce((s, a) => s + (a?.length || 0), 0);
    state.liveKB.totalItems = cases + ops;
    state.liveKB.lastUpdated = tsRaw;
    showLiveKBBadge();
  } catch (e) {
    state.liveKB.status = 'offline';
    showLiveKBBadge();
  }
})();

function showLiveKBBadge() {
  const target = document.querySelector('.sidebar-top') || document.querySelector('.sidebar') || document.body;
  const old = document.getElementById('liveKbBadge'); if (old) old.remove();
  const b = document.createElement('div');
  b.id = 'liveKbBadge';
  b.style.cssText = 'margin: 10px 12px; padding: 9px 12px; background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.25); border-radius: 8px; font-size: 11px; color: var(--text-secondary); line-height: 1.5;';
  const kb = state.liveKB;
  if (kb.status === 'offline' || !kb.caseLaw) {
    b.innerHTML = '<span style="color:#f59e0b;">●</span> Live KB offline — using built-in data';
  } else {
    const ts = kb.lastUpdated ? new Date(kb.lastUpdated).toLocaleDateString('en-IN', {day:'numeric', month:'short'}) : 'today';
    b.innerHTML = '<span style="color:#4ade80;">●</span> Live KB · ' + (kb.totalItems || 0) + ' items · synced ' + ts;
    b.title = 'Auto-updated daily from CBDT, ITAT, TaxGuru. Type /updates in chat to see what\'s new.';
  }
  target.appendChild(b);
}

// Chat command: type "/updates" to see what's new
const _origHandleUserText = typeof handleUserText === 'function' ? handleUserText : null;
window.handleUserText = async function(text) {
  if (text.trim().toLowerCase() === '/updates') {
    const kb = state.liveKB || {};
    if (kb.status !== 'ok' || !kb.caseLaw) {
      ai('<p>Live KB not loaded yet. Try again in a moment.</p>');
      return;
    }
    const cases = (kb.caseLaw?.pending_review || []).slice(0, 5);
    let html = '<p><b>Latest from the daily auto-scraper:</b></p>';
    if (cases.length === 0) {
      html += '<p class="secondary small">No new case law in pending review yet.</p>';
    } else {
      html += '<div style="margin-top:10px;">';
      // DEV-2 #1 (Critical): scraped content is untrusted — escape every field, gate URL scheme to https.
      const safeUrl = (u) => {
        try {
          const parsed = new URL(String(u || ''), 'https://example.com');
          return (parsed.protocol === 'https:' || parsed.protocol === 'http:') ? parsed.toString() : '#';
        } catch { return '#'; }
      };
      cases.forEach(c => {
        const url = esc(safeUrl(c.url));
        const title = esc(c.title || '(untitled)');
        const source = esc(c.source || '');
        const date = esc(c.date || '');
        html += '<div style="padding:8px 10px; background:var(--bg-elevated); border-radius:8px; margin-bottom:6px; font-size:13px;"><a href="' + url + '" target="_blank" rel="noopener noreferrer" style="color:#c4b5fd;">' + title + '</a><div style="color:var(--text-muted); font-size:11px; margin-top:2px;">' + source + ' · ' + date + '</div></div>';
      });
      html += '</div>';
    }
    html += '<p class="secondary small" style="margin-top:10px;">Synced ' + (kb.lastUpdated ? new Date(kb.lastUpdated).toLocaleString('en-IN') : 'recently') + '. Auto-runs daily at 1:30 AM IST.</p>';
    ai(html);
    return;
  }
  if (_origHandleUserText) return _origHandleUserText(text);
};

// Audit fix #18: global error boundary — surface JS crashes as a friendly message
// instead of letting the page silently break.
window.addEventListener('error', (e) => {
  try {
    if (typeof ai === 'function') {
      ai('<p style="color:#fca5a5;"><b>Something went wrong:</b> ' + esc(e.message || 'Unknown error') + '</p><p class="secondary small">If this keeps happening, refresh the page or email <a href="mailto:hello@taxy.in">hello@taxy.in</a> with what you were doing.</p>');
    }
  } catch (_) { /* swallow — don't loop */ }
});
window.addEventListener('unhandledrejection', (e) => {
  try {
    if (typeof ai === 'function') {
      const msg = e.reason && (e.reason.message || String(e.reason)) || 'Unknown async error';
      ai('<p style="color:#fca5a5;"><b>Something went wrong:</b> ' + esc(msg) + '</p>');
    }
  } catch (_) { /* swallow */ }
});
