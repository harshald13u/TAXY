name: Taxy Daily Update

# Runs every day at 20:00 UTC (01:30 IST next day).
# Free on GitHub Actions for public repos. ~2 minutes of compute per run.

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:        # also allow manual trigger from Actions tab

permissions:
  contents: write           # required to push the updated KB JSONs back to repo

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape sources
        working-directory: backend
        run: python scrape_updates.py
        continue-on-error: true     # one bad source shouldn't kill the run

      - name: Compute diff
        working-directory: backend
        run: python diff_engine.py
        continue-on-error: true

      - name: Update KB (pending review)
        working-directory: backend
        run: python update_kb.py
        # NOTE: --auto-approve disabled by default. Promote items manually
        # by reviewing backend/data/_diff.json and the KB pending_review section.

      - name: Show diff summary
        working-directory: backend
        run: |
          if [ -f data/_diff.json ]; then
            python -c "import json; d=json.load(open('data/_diff.json')); print('NEW ITEMS:', d['summary']['new_total']); print('SOURCES CHANGED:', d['summary']['sources_with_changes'])"
          fi

      - name: Commit & push updates
        run: |
          git config user.name "taxy-bot"
          git config user.email "taxy-bot@users.noreply.github.com"
          git add backend/data landmark_case_law.json operational_reference_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: daily KB update $(date -u +%Y-%m-%d)"
            git push
          fi
